vocabulary:
  name: Yardi Propware Vocabulary
  description: >-
    Domain vocabulary for Yardi Propware property management software, covering
    real estate management concepts, lease terminology, accounting constructs,
    and property operations used across residential and commercial portfolios.
  version: '1.0'
  created: '2026-05-03'
  modified: '2026-05-03'
  tags:
    - Property Management
    - Real Estate
    - Yardi

  terms:

    - term: Property
      definition: >-
        A real estate asset managed within the Propware system, including residential
        apartments, commercial buildings, or mixed-use developments.
      tags:
        - Core
        - Real Estate

    - term: Unit
      definition: >-
        An individual leasable space within a property, such as an apartment unit,
        office suite, or retail bay.
      tags:
        - Core
        - Real Estate

    - term: Tenant
      definition: >-
        A person or organization occupying a unit under a lease agreement. Also
        referred to as a resident in residential contexts.
      tags:
        - Core
        - Leasing

    - term: Lease
      definition: >-
        A legal agreement defining the terms under which a tenant occupies a unit,
        including rent amount, lease term, and renewal options.
      tags:
        - Core
        - Leasing

    - term: Resident
      definition: >-
        A tenant in a residential property. Used interchangeably with Tenant in
        multifamily contexts.
      tags:
        - Residential
        - Leasing

    - term: Rent Roll
      definition: >-
        A report listing all units in a property, their tenants, lease terms,
        monthly rent amounts, and vacancy status.
      tags:
        - Reporting
        - Accounting

    - term: Chart of Accounts
      definition: >-
        The complete list of financial accounts used to categorize income and
        expenses within the property management accounting system.
      tags:
        - Accounting
        - Finance

    - term: General Ledger
      definition: >-
        The master set of financial records tracking all transactions across all
        accounts for a property or portfolio.
      tags:
        - Accounting
        - Finance

    - term: Accounts Payable
      definition: >-
        Amounts owed by the property management company to vendors and service
        providers for goods and services rendered.
      tags:
        - Accounting
        - Finance

    - term: Accounts Receivable
      definition: >-
        Amounts owed to the property management company by tenants for rent,
        fees, and other charges.
      tags:
        - Accounting
        - Finance

    - term: Work Order
      definition: >-
        A maintenance or repair request generated by a tenant or property manager,
        tracked through completion within the system.
      tags:
        - Maintenance
        - Operations

    - term: Vendor
      definition: >-
        A third-party service provider or contractor engaged to perform maintenance,
        repairs, or other services for a property.
      tags:
        - Vendors
        - Operations

    - term: Vacancy
      definition: >-
        A unit that is unoccupied and available for leasing. Tracked to support
        occupancy reporting and marketing activities.
      tags:
        - Leasing
        - Reporting

    - term: Occupancy Rate
      definition: >-
        The percentage of units in a property that are currently leased and
        occupied, calculated as occupied units divided by total units.
      tags:
        - Reporting
        - Operations

    - term: Late Fee
      definition: >-
        A charge assessed to a tenant when rent or other payment is not received
        by the agreed-upon due date.
      tags:
        - Accounting
        - Leasing

    - term: Security Deposit
      definition: >-
        A refundable amount collected from a tenant at lease inception to cover
        potential damages or unpaid rent.
      tags:
        - Leasing
        - Accounting

    - term: Portfolio
      definition: >-
        A collection of properties managed under a single ownership or management
        entity within the Propware system.
      tags:
        - Core
        - Real Estate

    - term: Interface Partner
      definition: >-
        A third-party software vendor certified by Yardi to integrate with Yardi
        systems through the Interface Partnership Program.
      tags:
        - Integrations
        - Partners
