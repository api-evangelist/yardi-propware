aid: yardi-propware
name: Yardi Propware
description: >-
  Yardi Propware was the original flagship property management software by Yardi Systems,
  first released in 1984. It was an early desktop-based real estate management platform
  for residential and commercial property accounting, leasing, and management. Yardi
  has since evolved its platform into cloud-based offerings including Yardi Voyager and
  Yardi Breeze. No publicly accessible developer portal or documented REST API has been
  confirmed for Yardi Propware specifically; Yardi's modern integrations are managed
  through the Yardi Interface Partnership Program.
